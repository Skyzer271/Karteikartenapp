<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karteikarten-App</title>
    <meta name="description" content="Intelligentes Lernen mit Karteikarten und Spaced Repetition" />
    
    <!-- GitHub Pages SPA Redirect Script -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // This script handles routing for SPAs on GitHub Pages
      (function() {
        // Get the current path
        var path = window.location.pathname;
        var repo = '/Karteikartenapp';
        
        // Check if we're on GitHub Pages and not at the root
        if (path.indexOf(repo) === 0 && path !== repo + '/' && !path.match(/\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$/)) {
          // Save the current path to sessionStorage
          sessionStorage.setItem('spa-redirect', path + window.location.search + window.location.hash);
          // Redirect to the root
          window.location.replace(repo + '/');
        }
        
        // Check if we have a saved redirect
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          // Use history API to restore the original URL
          if (window.history && window.history.replaceState) {
            window.history.replaceState(null, null, redirect);
          }
        }
      })();
    </script>
    
    <!-- Theme Detection - Prevent Flash -->
    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
