name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "24" # most current version supported by github actions/setup-node
          cache: "npm"

      - name: Verify lock file
        run: |
          echo "Checking package-lock.json..."
          ls -la package*.json
          node --version
          npm --version

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm ci 2>&1 || npm install 2>&1

      - name: Build
        run: |
          echo "Starting build..."
          npm run build 2>&1
        env:
          CI: true
          NODE_ENV: production

      - name: Check dist contents
        if: success()
        run: |
          echo "Build succeeded! Contents of dist:"
          ls -la ./dist

      - name: Setup SPA routing for GitHub Pages
        if: success()
        run: |
          cp ./dist/index.html ./dist/404.html
          touch ./dist/.nojekyll

      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
